name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: pip install briefcase

      - name: Create iOS app
        run: briefcase create iOS

      - name: Build iOS app
        run: briefcase build iOS

      - name: Package IPA
        run: briefcase package iOS
